name: BACKEND - Build, Push and Deploy Image (GHCR)

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/src/admin/**
      - frontend/package*.json
      - .github/workflows/backend.yml
  workflow_dispatch:
    inputs:
      deploy:
        type: boolean
        description: "Deploy to Lightsail (restarts containers)"
        default: false
      build:
        type: boolean
        description: "Build & push image to GHCR"
        default: true
      tag:
        type: string
        description: "Image tag to deploy (only used for manual runs)"
        default: "latest"
      run_tests:
        type: boolean
        description: "Run post-deploy smoke tests"
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Must match what docker-compose.prod.yml / deploy_lightsail.sh pull in production.
  # Use the repo owner namespace so the default GITHUB_TOKEN can push to GHCR.
  IMAGE_NAME: ${{ github.repository_owner }}/live.moafunk.de-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: github.event_name != 'workflow_dispatch' || inputs.build == true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: github.event_name != 'workflow_dispatch' || inputs.build == true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: github.event_name != 'workflow_dispatch' || inputs.build == true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        if: github.event_name != 'workflow_dispatch' || inputs.build == true
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN can push to ghcr.io/<repo_owner>/* when packages: write is granted.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        if: github.event_name != 'workflow_dispatch' || inputs.build == true
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        if: github.event_name != 'workflow_dispatch' || inputs.build == true
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          # Always push — workflow only runs on main or manual dispatch
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # Deploy on push to main, or when manually triggered with deploy=true on main.
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true))
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        id: bitwarden-secrets
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            b97681cf-bf60-49d5-9186-b3e701004d75 > LIGHTSAIL_SSH_KEY
            429acaa6-d722-4882-b072-b3e701003070 > LIGHTSAIL_IP
            780bf50d-98fd-4bd4-b470-b3e701001e63 > GHCR_DEPLOY_TOKEN
            41363d58-f866-4c70-b8e6-b3e70100636b > GHCR_USERNAME
            eeda2f4a-6fb9-470d-a909-b3ec01488545 > SECRET_KEY
            a30cd3c6-2724-44ed-95d3-b3ec0148acdc > SUPERADMIN_PASSWORD_HASH
            9559957d-a86d-4a08-8a4a-b3ec0148d511 > R2_ACCOUNT_ID
            22c94ab2-a97c-4deb-aaee-b3ec0148efe9 > R2_ACCESS_KEY_ID
            df159915-c6ce-470a-9678-b3ec01490ed7 > R2_SECRET_ACCESS_KEY
            3bbfc155-b13a-45bc-aa2a-b3e80089d1ec > INSTAGRAM_ACCESS_TOKEN_DEV
            58e0efe4-94e0-49a4-b4c3-b3eb01558207 > INSTAGRAM_BUSINESS_ACCOUNT_ID_DEV
            17df2212-b8a2-4e8a-9537-b3e80013777e > INSTAGRAM_ACCESS_TOKEN_PROD
            922b4a5b-f803-4502-a182-b3e80090d6b6 > INSTAGRAM_BUSINESS_ACCOUNT_ID_PROD
            57ca8c3f-ada3-4902-88d2-b3e80090c176 > FACEBOOK_APP_ID
            5e2f46de-e289-41d5-85fd-b3e800909ec5 > FACEBOOK_APP_SECRET
            782620cd-7d54-4cef-95b5-b3eb01660ff9 > OPENAI_API_KEY
            2470e0a8-7e96-4113-9931-b3ed0180cf59 > TELEGRAM_BOT_TOKEN
            3d3c982b-6933-4c23-bb11-b3ee000687d6 > TELEGRAM_ADMIN_CHAT_ID
            0ede7c60-027a-45af-99ae-b3ec013f22a7 > SOUNDCLOUD_CLIENT_ID
            fb23eb6e-139b-45be-a95a-b3ec013f2eac > SOUNDCLOUD_CLIENT_SECRET

      - name: Generate production .env file
        run: |
          cat > /tmp/production.env << 'ENVHEADER'
          # ==============================================
          # Production .env — generated by CI from Bitwarden SM
          # Do NOT edit manually on the server.
          # Update secrets in Bitwarden, then re-deploy.
          # ==============================================

          # App settings
          HOST=0.0.0.0
          PORT=8000
          DATABASE_URL=sqlite:./data/unheard.db?mode=rwc
          MAX_FILE_SIZE_MB=100
          MAX_UPLOAD_SIZE_MB=250
          RUST_LOG=info,tower_http=debug
          ENVHEADER
          sed -i 's/^          //' /tmp/production.env

          # Append secrets (note: GHA masks secret values in logs automatically)
          {
            echo "SECRET_KEY=${{ steps.bitwarden-secrets.outputs.SECRET_KEY }}"
            echo "SUPERADMIN_PASSWORD_HASH=${{ steps.bitwarden-secrets.outputs.SUPERADMIN_PASSWORD_HASH }}"
            echo ""
            echo "# Cloudflare R2"
            echo "R2_ACCOUNT_ID=${{ steps.bitwarden-secrets.outputs.R2_ACCOUNT_ID }}"
            echo "R2_ACCESS_KEY_ID=${{ steps.bitwarden-secrets.outputs.R2_ACCESS_KEY_ID }}"
            echo "R2_SECRET_ACCESS_KEY=${{ steps.bitwarden-secrets.outputs.R2_SECRET_ACCESS_KEY }}"
            echo "R2_BUCKET_NAME=unheard-artists-prod"
            echo ""
            echo "# Instagram API (DEV)"
            echo "INSTAGRAM_ACCESS_TOKEN_DEV=${{ steps.bitwarden-secrets.outputs.INSTAGRAM_ACCESS_TOKEN_DEV }}"
            echo "INSTAGRAM_BUSINESS_ACCOUNT_ID_DEV=${{ steps.bitwarden-secrets.outputs.INSTAGRAM_BUSINESS_ACCOUNT_ID_DEV }}"
            echo "# Instagram API (PROD) — uncomment to switch"
            echo "# INSTAGRAM_ACCESS_TOKEN_DEV=${{ steps.bitwarden-secrets.outputs.INSTAGRAM_ACCESS_TOKEN_PROD }}"
            echo "# INSTAGRAM_BUSINESS_ACCOUNT_ID_DEV=${{ steps.bitwarden-secrets.outputs.INSTAGRAM_BUSINESS_ACCOUNT_ID_PROD }}"
            echo ""
            echo "# Facebook (token refresh)"
            echo "FACEBOOK_APP_ID=${{ steps.bitwarden-secrets.outputs.FACEBOOK_APP_ID }}"
            echo "FACEBOOK_APP_SECRET=${{ steps.bitwarden-secrets.outputs.FACEBOOK_APP_SECRET }}"
            echo ""
            echo "# OpenAI"
            echo "OPENAI_API_KEY=${{ steps.bitwarden-secrets.outputs.OPENAI_API_KEY }}"
            echo ""
            echo "# Telegram bot"
            echo "TELEGRAM_BOT_TOKEN=${{ steps.bitwarden-secrets.outputs.TELEGRAM_BOT_TOKEN }}"
            echo "TELEGRAM_ADMIN_CHAT_ID=${{ steps.bitwarden-secrets.outputs.TELEGRAM_ADMIN_CHAT_ID }}"
            echo "TELEGRAM_INSTAGRAM_ACCOUNT=prod"
            echo "TELEGRAM_ARTIST_PREVIEW_HOUR=16"
            echo ""
            echo "# SoundCloud"
            echo "SOUNDCLOUD_CLIENT_ID=${{ steps.bitwarden-secrets.outputs.SOUNDCLOUD_CLIENT_ID }}"
            echo "SOUNDCLOUD_CLIENT_SECRET=${{ steps.bitwarden-secrets.outputs.SOUNDCLOUD_CLIENT_SECRET }}"
            echo "SOUNDCLOUD_REDIRECT_URI=https://admin.live.moafunk.de/api/soundcloud/callback"
            echo ""
            echo "# Backup settings"
            echo "BACKUP_BUCKET=unheard-backups"
            echo "BACKUP_RETENTION=28"
            echo "RCLONE_REMOTE=r2-backup"
          } >> /tmp/production.env

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          # Add host key to known_hosts to avoid interactive prompt
          ssh-keyscan -H ${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Lightsail
        env:
          GHCR_TOKEN: ${{ steps.bitwarden-secrets.outputs.GHCR_DEPLOY_TOKEN }}
          GHCR_USER: ${{ steps.bitwarden-secrets.outputs.GHCR_USERNAME || github.repository_owner }}
        run: |
          # Write GHCR token to temp file
          echo "$GHCR_TOKEN" > /tmp/ghcr-token.key

          # Run deploy script (skips nginx setup since already configured)
          IP="${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_IP }}" \
          PEM=~/.ssh/lightsail.pem \
          GHCR_USER="$GHCR_USER" \
          GHCR_TOKEN_FILE=/tmp/ghcr-token.key \
          ENV_FILE_PATH=/tmp/production.env \
          UNHEARD_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" \
          UNHEARD_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}" \
          SETUP_NGINX=0 \
          RUN_TESTS="${{ github.event_name == 'workflow_dispatch' && inputs.run_tests == false && '0' || '1' }}" \
          ./backend/scripts/deploy_lightsail.sh

  sync-scripts:
    # Sync backup/r2/db scripts to Lightsail without a full deploy.
    # Runs on push to main when only scripts changed, or always during full deploy.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Need HEAD~1 for git diff

      - name: Check if scripts changed
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q '^backend/scripts/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Get secrets from Bitwarden
        if: steps.changes.outputs.changed == 'true'
        uses: bitwarden/sm-action@v2
        id: bitwarden-secrets
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            b97681cf-bf60-49d5-9186-b3e701004d75 > LIGHTSAIL_SSH_KEY
            429acaa6-d722-4882-b072-b3e701003070 > LIGHTSAIL_IP

      - name: Upload scripts to Lightsail
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H ${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_IP }} >> ~/.ssh/known_hosts 2>/dev/null

          SSH_HOST="ubuntu@${{ steps.bitwarden-secrets.outputs.LIGHTSAIL_IP }}"
          PEM=~/.ssh/lightsail.pem
          REMOTE_DIR=/opt/unheard-backend

          echo "Uploading scripts to Lightsail..."
          for dir in backup r2 db config; do
            if [[ -d "backend/scripts/$dir" ]]; then
              # Create matching dir in /tmp so scp copies only contents
              ssh -i "$PEM" -o StrictHostKeyChecking=no "$SSH_HOST" "mkdir -p /tmp/scripts-upload/$dir"
              scp -i "$PEM" -o StrictHostKeyChecking=no backend/scripts/$dir/* "$SSH_HOST:/tmp/scripts-upload/$dir/"
            fi
          done

          ssh -i "$PEM" -o StrictHostKeyChecking=no "$SSH_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          REMOTE_DIR=/opt/unheard-backend
          sudo mkdir -p "$REMOTE_DIR/scripts"
          for dir in backup r2 db config; do
            if [[ -d "/tmp/scripts-upload/$dir" ]]; then
              sudo rm -rf "$REMOTE_DIR/scripts/$dir"
              sudo mkdir -p "$REMOTE_DIR/scripts/$dir"
              sudo mv /tmp/scripts-upload/$dir/* "$REMOTE_DIR/scripts/$dir/"
            fi
          done
          rm -rf /tmp/scripts-upload
          sudo chmod -R +x "$REMOTE_DIR/scripts/"*/*.sh 2>/dev/null || true
          echo "Scripts synced successfully"
          REMOTE
